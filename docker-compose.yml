services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: jackson_ventures
      POSTGRES_USER: jackson
      POSTGRES_PASSWORD: jackson_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jackson -d jackson_ventures"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
